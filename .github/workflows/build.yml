name: Build APK

# Compila el APK en la nube (servidor Linux gratis de GitHub).
# Metodo directo y mantenido (sin la accion Docker que estaba rota).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential ccache libsqlite3-dev

      - name: Instalar Buildozer y Cython (versiones probadas y estables)
        run: |
          python -m pip install --upgrade pip
          pip install "cython==0.29.36"
          pip install "python-for-android==2024.1.21"
          pip install "buildozer==1.5.0"

      - name: Cache de Buildozer (acelera builds futuros)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Compilar APK (debug)
        run: buildozer android debug

      - name: Subir el APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlexAlert-APK
          path: bin/*.apk
          if-no-files-found: error
